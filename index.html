<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DUMP — 詰め込むだけ整理ツール</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#f0f8ff;--bg2:#e4f3fc;--surface:#fff;--surface2:#f5fbff;
    --border:#c2e4f5;--border2:#a8d8ef;
    --accent:#1aa3d4;--accent-light:#e0f4fc;--accent-dark:#0d7fa8;
    --fav:#f5a623;--fav-light:#fff8ec;
    --text:#1a2e3a;--muted:#7da8be;
    --radius:14px;
    --shadow:0 2px 12px rgba(26,163,212,.08);
    --shadow-h:0 4px 20px rgba(26,163,212,.14);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);background-image:radial-gradient(circle at 15% 0%,rgba(26,163,212,.07) 0%,transparent 50%),radial-gradient(circle at 85% 100%,rgba(26,163,212,.05) 0%,transparent 50%);color:var(--text);font-family:'Noto Sans JP',sans-serif;min-height:100vh}

  /* ---- Header ---- */
  header{background:rgba(255,255,255,.93);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:200}
  .logo-wrap{display:flex;align-items:center;gap:10px}
  .logo-icon{width:34px;height:34px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 2px 8px rgba(26,163,212,.3)}
  .logo{font-family:'DM Sans',sans-serif;font-weight:700;font-size:20px;color:var(--accent-dark);letter-spacing:-.5px}
  .tagline{font-size:11px;color:var(--muted)}
  .total-count{margin-left:auto;font-size:12px;color:var(--accent);background:var(--accent-light);padding:4px 12px;border-radius:20px;font-weight:500;border:1px solid var(--border);white-space:nowrap}

  /* ---- Tabs ---- */
  .tabs-bar{background:rgba(255,255,255,.93);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);padding:0 20px;display:flex;position:sticky;top:63px;z-index:150;overflow-x:auto}
  .tab-btn{padding:12px 16px;font-size:13px;font-family:'Noto Sans JP',sans-serif;font-weight:500;color:var(--muted);border:none;background:none;cursor:pointer;border-bottom:2.5px solid transparent;transition:all .15s;display:flex;align-items:center;gap:6px;white-space:nowrap;flex-shrink:0}
  .tab-btn:hover{color:var(--accent)}
  .tab-btn.active{color:var(--accent-dark);border-bottom-color:var(--accent);font-weight:700}
  .tab-btn.fav-tab{color:var(--fav)}
  .tab-btn.fav-tab.active{color:var(--fav);border-bottom-color:var(--fav)}
  .tab-count{font-size:10px;background:var(--accent-light);color:var(--accent);padding:1px 7px;border-radius:10px;font-weight:500}
  .tab-btn.active .tab-count{background:var(--accent);color:#fff}
  .tab-btn.fav-tab .tab-count{background:var(--fav-light);color:var(--fav);border:1px solid #ffe0a0}
  .tab-btn.fav-tab.active .tab-count{background:var(--fav);color:#fff}

  /* ---- Container ---- */
  .container{max-width:860px;margin:0 auto;padding:22px 16px 80px}

  /* ---- Input area ---- */
  .input-area{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:14px;box-shadow:var(--shadow);transition:border-color .2s,box-shadow .2s}
  .input-area:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(26,163,212,.09),var(--shadow)}
  .input-label{font-size:11px;color:var(--accent);letter-spacing:.1em;text-transform:uppercase;font-family:'DM Sans',sans-serif;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:6px}
  .input-label::before{content:'';display:inline-block;width:6px;height:6px;background:var(--accent);border-radius:50%}
  textarea{width:100%;background:transparent;border:none;outline:none;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:14px;line-height:1.75;resize:none;min-height:64px}
  textarea::placeholder{color:#b0cede}
  .schedule-meta{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
  .date-input{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:7px 12px;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:13px;outline:none;transition:border-color .2s}
  .date-input:focus{border-color:var(--accent)}
  .input-footer{display:flex;justify-content:space-between;align-items:center;margin-top:12px;padding-top:10px;border-top:1px solid var(--bg2);gap:8px;flex-wrap:wrap}
  .hint{font-size:11px;color:var(--muted)}
  .save-btn{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:10px 22px;font-family:'DM Sans',sans-serif;font-weight:700;font-size:13px;cursor:pointer;transition:background .15s,transform .1s;box-shadow:0 2px 8px rgba(26,163,212,.3);display:flex;align-items:center;gap:6px}
  .save-btn:hover{background:var(--accent-dark)}
  .save-btn:active{transform:scale(.97)}

  /* ---- Controls ---- */
  .controls{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
  .search-box{flex:1;min-width:140px;background:var(--surface);border:1.5px solid var(--border);border-radius:10px;padding:9px 14px;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:13px;outline:none;transition:border-color .2s,box-shadow .2s;box-shadow:var(--shadow)}
  .search-box:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(26,163,212,.09)}
  .search-box::placeholder{color:#b0cede}
  .dl-group{display:flex;gap:6px}
  .dl-btn{background:var(--surface);border:1.5px solid var(--border);border-radius:10px;padding:8px 14px;color:var(--muted);font-size:12px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:all .15s;display:flex;align-items:center;gap:5px;box-shadow:var(--shadow);white-space:nowrap}
  .dl-btn:hover{border-color:var(--accent);color:var(--accent)}

  /* ---- Cards ---- */
  .cards-grid{display:flex;flex-direction:column;gap:10px}
  .card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:16px 18px;position:relative;animation:slideIn .28s ease;box-shadow:var(--shadow);transition:box-shadow .2s,border-color .2s}
  .card:hover{box-shadow:var(--shadow-h);border-color:var(--border2)}
  .card.favorited{border-color:#ffd080;background:linear-gradient(to bottom right,#fffdf5,#fff)}
  @keyframes slideIn{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}

  .card-top{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
  .card-time{font-size:11px;color:var(--muted)}
  .card-due{font-size:11px;color:#fff;padding:2px 9px;border-radius:5px;font-weight:500}
  .card-due.ok{background:var(--accent)}.card-due.soon{background:#f5a623}.card-due.past{background:#e05555}

  .card-content{font-size:14px;line-height:1.75;color:var(--text);margin-bottom:10px;white-space:pre-wrap;word-break:break-word}

  /* tags */
  .card-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;align-items:center}
  .tag{font-size:11px;padding:3px 9px;border-radius:5px;background:var(--accent-light);color:var(--accent-dark);border:1px solid var(--border);font-weight:500;display:inline-flex;align-items:center;gap:4px}
  .tag-x{cursor:pointer;opacity:.55;font-size:12px;line-height:1;border:none;background:none;color:inherit;padding:0}
  .tag-x:hover{opacity:1}
  .tag-add-btn{font-size:11px;padding:3px 9px;border-radius:5px;border:1.5px dashed var(--border2);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s;font-family:'Noto Sans JP',sans-serif}
  .tag-add-btn:hover{border-color:var(--accent);color:var(--accent)}

  /* tag inline input */
  .tag-input-wrap{display:inline-flex;align-items:center;gap:4px}
  .tag-inline-input{font-size:11px;padding:3px 8px;border-radius:5px;border:1.5px solid var(--accent);outline:none;font-family:'Noto Sans JP',sans-serif;color:var(--text);background:var(--surface);width:90px}

  /* card actions */
  .card-actions{display:flex;gap:6px;flex-wrap:wrap;align-items:center;padding-top:8px;border-top:1px solid var(--bg2)}
  .act-btn{font-size:11px;padding:5px 12px;border-radius:7px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:all .15s;display:flex;align-items:center;gap:4px;line-height:1.2}
  .act-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
  .act-btn.fav-on{border-color:var(--fav);color:var(--fav);background:var(--fav-light)}
  .act-btn.fav-on:hover{background:#ffecd0}
  .act-btn.copied{border-color:#4caf8a;color:#4caf8a;background:#edfaf4}

  /* corner delete */
  .card-delete{position:absolute;top:12px;right:12px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:4px 6px;border-radius:6px;transition:all .15s;opacity:0;line-height:1}
  .card:hover .card-delete{opacity:1}
  .card-delete:hover{background:#fee;color:#e05555}

  /* ---- Fav empty ---- */
  .empty{text-align:center;padding:52px 20px;color:var(--muted)}
  .empty-icon{font-size:42px;margin-bottom:12px}
  .empty-text{font-size:13px;line-height:1.85}

  /* ---- Scroll top ---- */
  .scroll-top{position:fixed;bottom:24px;right:24px;background:var(--surface);border:1.5px solid var(--border);color:var(--accent);width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;box-shadow:var(--shadow);transition:all .2s;opacity:0;pointer-events:none}
  .scroll-top.visible{opacity:1;pointer-events:auto}
  .scroll-top:hover{background:var(--accent);color:#fff}
</style>
</head>
<body>

<header>
  <div class="logo-wrap">
    <div class="logo-icon">📥</div>
    <div>
      <div class="logo">DUMP</div>
      <div class="tagline">詰め込むだけ整理ツール</div>
    </div>
  </div>
  <div class="total-count" id="totalCount">合計 0 件</div>
</header>

<div class="tabs-bar">
  <button class="tab-btn active" onclick="switchTab('diary',this)">📔 日記 <span class="tab-count" id="cnt-diary">0</span></button>
  <button class="tab-btn" onclick="switchTab('idea',this)">💡 アイデア <span class="tab-count" id="cnt-idea">0</span></button>
  <button class="tab-btn" onclick="switchTab('schedule',this)">📅 スケジュール <span class="tab-count" id="cnt-schedule">0</span></button>
  <button class="tab-btn" onclick="switchTab('memo',this)">📝 メモ <span class="tab-count" id="cnt-memo">0</span></button>
  <button class="tab-btn fav-tab" onclick="switchTab('favorites',this)">⭐ お気に入り <span class="tab-count" id="cnt-favorites">0</span></button>
</div>

<div class="container">
  <!-- input (hidden on favorites tab) -->
  <div id="inputArea" class="input-area">
    <div class="input-label" id="inputLabel">日記を書く</div>
    <textarea id="inputText" placeholder="今日あったことを書いてみて。箇条書きでも文章でもOK。" rows="3"></textarea>
    <div class="schedule-meta" id="scheduleMeta" style="display:none">
      <input type="date" class="date-input" id="schedDate">
      <input type="time" class="date-input" id="schedTime">
    </div>
    <div class="input-footer">
      <span class="hint">Ctrl + Enter で保存</span>
      <button class="save-btn" onclick="submitDump()"><span id="btnLabel">保存する</span> →</button>
    </div>
  </div>

  <!-- controls -->
  <div class="controls">
    <input class="search-box" id="searchBox" placeholder="🔍 キーワードで検索…" oninput="renderCards()">
    <div class="dl-group">
      <button class="dl-btn" onclick="downloadTxt()">⬇ TXT</button>
      <button class="dl-btn" onclick="downloadCsv()">⬇ CSV</button>
    </div>
  </div>

  <div class="cards-grid" id="cardsGrid"></div>
</div>

<div class="scroll-top" id="scrollTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</div>

<script>
const TABS = {
  diary:     {label:'日記',        icon:'📔', ph:'今日あったことを書いてみて。箇条書きでも文章でもOK。',        hasDate:false},
  idea:      {label:'アイデア',    icon:'💡', ph:'ビジネスアイデア、ひらめき、やってみたいこと… なんでも。',    hasDate:false},
  schedule:  {label:'スケジュール',icon:'📅', ph:'予定やタスクを入力。日付も選んでね。',                        hasDate:true},
  memo:      {label:'メモ',        icon:'📝', ph:'あとで使いたいこと、忘れたくないこと、なんでも放り込んで。',  hasDate:false},
  favorites: {label:'お気に入り',  icon:'⭐', ph:'', hasDate:false},
};

let cur = 'diary';
let data = JSON.parse(localStorage.getItem('dump_v4') || '{"diary":[],"idea":[],"schedule":[],"memo":[]}');
['diary','idea','schedule','memo'].forEach(t=>{ if(!data[t]) data[t]=[]; });

// ---- Switch tab ----
function switchTab(tab, el) {
  cur = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');

  const isFav = tab === 'favorites';
  document.getElementById('inputArea').style.display = isFav ? 'none' : 'block';

  if (!isFav) {
    const c = TABS[tab];
    document.getElementById('inputLabel').textContent = c.label + 'を書く';
    document.getElementById('inputText').placeholder = c.ph;
    document.getElementById('scheduleMeta').style.display = c.hasDate ? 'flex' : 'none';
  }
  renderCards();
}

// ---- Save ----
function submitDump() {
  const text = document.getElementById('inputText').value.trim();
  if (!text) return;
  const btn = document.querySelector('.save-btn');
  const lbl = document.getElementById('btnLabel');
  btn.disabled = true; lbl.textContent = '保存中…';

  const dueDate = TABS[cur].hasDate ? document.getElementById('schedDate').value : '';
  const dueTime = TABS[cur].hasDate ? document.getElementById('schedTime').value : '';

  const item = {
    id: Date.now(),
    tab: cur,
    text,
    tags: [],
    dueDate,
    dueTime,
    favorited: false,
    date: new Date().toLocaleDateString('ja-JP', {month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit'})
  };
  data[cur].unshift(item);
  save();
  document.getElementById('inputText').value = '';
  if (dueDate) { document.getElementById('schedDate').value = ''; document.getElementById('schedTime').value = ''; }
  btn.disabled = false; lbl.textContent = '保存する';
  updateCounts(); renderCards();
}

// ---- Tags ----
function showTagInput(itemId) {
  const wrap = document.getElementById('tag-add-wrap-' + itemId);
  if (!wrap) return;
  wrap.innerHTML = `
    <div class="tag-input-wrap">
      <input class="tag-inline-input" id="tag-inp-${itemId}" placeholder="タグ名…" onkeydown="handleTagKey(event,${itemId})" autofocus>
      <button class="act-btn" onclick="confirmTag(${itemId})" style="padding:4px 8px">追加</button>
      <button class="act-btn" onclick="cancelTagInput(${itemId})" style="padding:4px 8px">×</button>
    </div>`;
  setTimeout(() => { const inp = document.getElementById('tag-inp-' + itemId); if(inp) inp.focus(); }, 30);
}

function handleTagKey(e, itemId) {
  if (e.key === 'Enter') confirmTag(itemId);
  if (e.key === 'Escape') cancelTagInput(itemId);
}

function confirmTag(itemId) {
  const inp = document.getElementById('tag-inp-' + itemId);
  if (!inp) return;
  const val = inp.value.trim().replace(/^#/, '');
  if (val) {
    const item = findItemAny(itemId);
    if (item && !item.tags.includes(val)) { item.tags.push(val); save(); }
  }
  renderCards();
}

function cancelTagInput(itemId) { renderCards(); }

function removeTag(itemId, tag) {
  const item = findItemAny(itemId);
  if (!item) return;
  item.tags = item.tags.filter(t => t !== tag);
  save(); renderCards();
}

// ---- Copy ----
function copyCard(itemId, btnEl) {
  const item = findItemAny(itemId);
  if (!item) return;
  let text = item.text;
  if (item.tags && item.tags.length) text += '\nタグ: ' + item.tags.map(t => '#' + t).join(' ');
  if (item.dueDate) text += '\n期日: ' + item.dueDate + (item.dueTime ? ' ' + item.dueTime : '');
  navigator.clipboard.writeText(text).then(() => {
    btnEl.classList.add('copied');
    btnEl.textContent = '✅ コピー済み';
    setTimeout(() => { btnEl.classList.remove('copied'); btnEl.innerHTML = '📋 コピー'; }, 2000);
  }).catch(() => { alert('コピーに失敗しました。'); });
}

// ---- Favorite ----
function toggleFav(itemId, btnEl) {
  const item = findItemAny(itemId);
  if (!item) return;
  item.favorited = !item.favorited;
  save(); updateCounts(); renderCards();
}

// ---- Delete ----
function deleteItem(itemId) {
  ['diary','idea','schedule','memo'].forEach(tab => {
    data[tab] = (data[tab] || []).filter(i => i.id !== itemId);
  });
  save(); updateCounts(); renderCards();
}

// ---- Render ----
function renderCards() {
  const grid = document.getElementById('cardsGrid');
  const q = document.getElementById('searchBox').value.toLowerCase();

  let items = [];
  if (cur === 'favorites') {
    ['diary','idea','schedule','memo'].forEach(tab => {
      (data[tab] || []).filter(i => i.favorited).forEach(i => items.push({...i, _tab: tab}));
    });
    items.sort((a, b) => b.id - a.id);
  } else {
    items = (data[cur] || []);
  }

  if (q) {
    items = items.filter(i =>
      i.text.toLowerCase().includes(q) ||
      (i.tags || []).some(t => t.toLowerCase().includes(q))
    );
  }

  if (items.length === 0) {
    const isFav = cur === 'favorites';
    const allFaved = ['diary','idea','schedule','memo'].reduce((n,t) => n + (data[t]||[]).filter(i=>i.favorited).length, 0);
    if (isFav && allFaved === 0 && !q) {
      grid.innerHTML = `<div class="empty"><div class="empty-icon">⭐</div><div class="empty-text">気に入ったメモの ⭐ を押すと<br>ここに集まるよ。</div></div>`;
    } else if (!q && !isFav && !(data[cur]||[]).length) {
      const c = TABS[cur];
      grid.innerHTML = `<div class="empty"><div class="empty-icon">${c.icon}</div><div class="empty-text">${c.label}を書いてみて。<br>タグ付け・コピー・お気に入りが使えるよ。</div></div>`;
    } else {
      grid.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><div class="empty-text">一致するものが見つかりません。</div></div>`;
    }
    return;
  }

  grid.innerHTML = items.map(item => {
    let dueHtml = '';
    if (item.dueDate) {
      const now = new Date(), due = new Date(item.dueDate + (item.dueTime ? 'T' + item.dueTime : 'T23:59'));
      const diff = due - now;
      const cls = diff < 0 ? 'past' : diff < 172800000 ? 'soon' : 'ok';
      dueHtml = `<span class="card-due ${cls}">📅 ${item.dueDate}${item.dueTime ? ' ' + item.dueTime : ''}</span>`;
    }

    // tab badge on favorites
    const tabBadge = cur === 'favorites'
      ? `<span style="font-size:10px;padding:2px 8px;border-radius:5px;background:var(--accent-light);color:var(--accent-dark);border:1px solid var(--border);font-weight:500">${TABS[item.tab||item._tab||cur]?.icon||''} ${TABS[item.tab||item._tab||cur]?.label||''}</span>`
      : '';

    const tagsHtml = (item.tags || []).map(t =>
      `<span class="tag">${esc(t)}<button class="tag-x" onclick="removeTag(${item.id},'${esc(t)}')" title="削除">×</button></span>`
    ).join('');

    const favLabel = item.favorited ? '⭐ お気に入り済み' : '☆ お気に入り';
    const favCls   = item.favorited ? 'act-btn fav-on' : 'act-btn';

    return `<div class="card ${item.favorited ? 'favorited' : ''}" id="card_${item.id}">
      <button class="card-delete" onclick="deleteItem(${item.id})" title="削除">×</button>
      <div class="card-top">
        <span class="card-time">${item.date}</span>
        ${tabBadge}
        ${dueHtml}
      </div>
      <div class="card-content">${esc(item.text)}</div>
      <div class="card-tags" id="tag-zone-${item.id}">
        ${tagsHtml}
        <div id="tag-add-wrap-${item.id}" style="display:inline-block">
          <button class="tag-add-btn" onclick="showTagInput(${item.id})">＋ タグ追加</button>
        </div>
      </div>
      <div class="card-actions">
        <button class="${favCls}" id="fav-btn-${item.id}" onclick="toggleFav(${item.id},this)">${favLabel}</button>
        <button class="act-btn" onclick="copyCard(${item.id},this)">📋 コピー</button>
      </div>
    </div>`;
  }).join('');
}

// ---- Download ----
function downloadTxt() {
  const items = getVisible();
  if (!items.length) { alert('データがありません。'); return; }
  const label = TABS[cur]?.label || 'データ';
  let txt = `=== ${TABS[cur]?.icon||''} ${label} ===\n出力日時: ${new Date().toLocaleString('ja-JP')}\n\n`;
  items.forEach((it, i) => {
    txt += `【${i+1}】${it.date}${it.dueDate ? '　期日:' + it.dueDate + (it.dueTime?' '+it.dueTime:'') : ''}\n`;
    txt += it.text + '\n';
    if (it.tags && it.tags.length) txt += 'タグ: ' + it.tags.map(t => '#' + t).join(' ') + '\n';
    txt += '\n';
  });
  dl(label + '_' + ds() + '.txt', txt, 'text/plain');
}

function downloadCsv() {
  const items = getVisible();
  if (!items.length) { alert('データがありません。'); return; }
  const label = TABS[cur]?.label || 'データ';
  const rows = [['日時', '内容', 'タグ', '期日', 'お気に入り']];
  items.forEach(it => rows.push([
    it.date,
    it.text.replace(/\n/g, ' '),
    (it.tags || []).join(' '),
    it.dueDate ? (it.dueDate + (it.dueTime ? ' ' + it.dueTime : '')) : '',
    it.favorited ? '★' : '',
  ]));
  const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g, '""')}"`).join(',')).join('\n');
  dl(label + '_' + ds() + '.csv', '\uFEFF' + csv, 'text/csv;charset=utf-8;');
}

function getVisible() {
  const q = document.getElementById('searchBox').value.toLowerCase();
  let items = cur === 'favorites'
    ? ['diary','idea','schedule','memo'].flatMap(t => (data[t]||[]).filter(i=>i.favorited)).sort((a,b)=>b.id-a.id)
    : (data[cur] || []);
  if (q) items = items.filter(i => i.text.toLowerCase().includes(q) || (i.tags||[]).some(t=>t.toLowerCase().includes(q)));
  return items;
}

// ---- Helpers ----
function findItemAny(id) {
  for (const tab of ['diary','idea','schedule','memo']) {
    const found = (data[tab]||[]).find(i => i.id === id);
    if (found) return found;
  }
  return null;
}

function updateCounts() {
  let total = 0;
  ['diary','idea','schedule','memo'].forEach(tab => {
    const n = (data[tab]||[]).length;
    total += n;
    const el = document.getElementById('cnt-' + tab);
    if (el) el.textContent = n;
  });
  const favN = ['diary','idea','schedule','memo'].reduce((n,t) => n + (data[t]||[]).filter(i=>i.favorited).length, 0);
  const favEl = document.getElementById('cnt-favorites');
  if (favEl) favEl.textContent = favN;
  document.getElementById('totalCount').textContent = '合計 ' + total + ' 件';
}

function dl(name, content, type) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([content], {type}));
  a.download = name; a.click();
}
function ds() { return new Date().toISOString().slice(0,10).replace(/-/g,''); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function save() { localStorage.setItem('dump_v4', JSON.stringify(data)); }

document.getElementById('inputText').addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') submitDump();
});
window.addEventListener('scroll', () => {
  document.getElementById('scrollTop').classList.toggle('visible', window.scrollY > 300);
});

updateCounts(); renderCards();
</script>
</body>
